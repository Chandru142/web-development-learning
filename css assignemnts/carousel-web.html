<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        line-height: 1.6;
        background-color: #f2f3f4;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
      }

      .carousel {
        max-height: 400px;
        overflow: hidden;
      }

      .carousel-inner img {
        height: 400px;
        object-fit: cover;
      }

      .content {
        display: flex;
        flex-direction: row;
        justify-content: center;
        align-items: center;
        background-color: #ffffff;
      }

      .content-1 {
        padding: 100px 50px;
      }
      .content-2 {
        padding: 100px 50px;
      }
      .content-3 {
        padding: 100px 50px;
      }
      .card {
        border: none;
        box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        transition: all 0.3s ease;
        cursor: pointer;
      }
      @media (max-width: 768px) {
        .carousel-inner img {
          height: 300px;
        }
        .content {
          flex-direction: column;
        }
        .carousel-caption h3 {
          font-size: 1.5rem;
        }

        .carousel-caption p {
          font-size: 1rem;
        }
      }
    </style>
  </head>
  <body>
    <div id="carouselExample" class="carousel slide" data-bs-ride="carousel">
      <div class="carousel-indicators">
        <button
          type="button"
          data-bs-target="#carouselExample"
          data-bs-slide-to="0"
          class="active"
        ></button>
        <button
          type="button"
          data-bs-target="#carouselExample"
          data-bs-slide-to="1"
        ></button>
        <button
          type="button"
          data-bs-target="#carouselExample"
          data-bs-slide-to="2"
        ></button>
      </div>
      <div class="carousel-inner">
        <div class="carousel-item active">
          <img
            src="https://images.pexels.com/photos/1181671/pexels-photo-1181671.jpeg?auto=compress&cs=tinysrgb&w=1200"
            class="d-block w-100"
            alt="Slide 1"
          />
          <div class="carousel-caption">
            <h3>Welcome to My Website</h3>
            <p>Discover amazing video content</p>
          </div>
        </div>
        <div class="carousel-item">
          <img
            src="https://images.pexels.com/photos/1194713/pexels-photo-1194713.jpeg?auto=compress&cs=tinysrgb&w=1200"
            class="d-block w-100"
            alt="Slide 2"
          />
          <div class="carousel-caption">
            <h3>Learn and Grow</h3>
            <p>Watch tutorials and guides</p>
          </div>
        </div>
        <div class="carousel-item">
          <img
            src="https://images.pexels.com/photos/1181676/pexels-photo-1181676.jpeg?auto=compress&cs=tinysrgb&w=1200"
            class="d-block w-100"
            alt="Slide 3"
          />
          <div class="carousel-caption">
            <h3>Explore More</h3>
            <p>Click the cards below to watch videos</p>
          </div>
        </div>
      </div>
      <button
        class="carousel-control-prev"
        type="button"
        data-bs-target="#carouselExample"
        data-bs-slide="prev"
      >
        <span class="carousel-control-prev-icon"></span>
      </button>
      <button
        class="carousel-control-next"
        type="button"
        data-bs-target="#carouselExample"
        data-bs-slide="next"
      >
        <span class="carousel-control-next-icon"></span>
      </button>
    </div>
    <div class="content">
      <div class="content-1">
        <div class="card" style="width: 18rem">
          <img
            src="https://images.pexels.com/photos/33440447/pexels-photo-33440447.jpeg"
            class="card-img-top"
            alt="..."
          />
          <div class="card-body">
            <h5 class="card-title">Card title</h5>

            <a href="https://youtu.be/-z0h3Qyg4e4" class="btn btn-primary"
              >Go somewhere</a
            >
          </div>
        </div>
      </div>
      <div class="content-2">
        <div class="card" style="width: 18rem">
          <img
            src="https://images.pexels.com/photos/33440447/pexels-photo-33440447.jpeg"
            class="card-img-top"
            alt="..."
          />
          <div class="card-body">
            <h5 class="card-title">Card title</h5>

            <a href="https://youtu.be/-z0h3Qyg4e4" class="btn btn-primary"
              >Go somewhere</a
            >
          </div>
        </div>
      </div>
      <div class="content-3">
        <div class="card" style="width: 18rem">
          <img
            src="https://images.pexels.com/photos/33440447/pexels-photo-33440447.jpeg"
            class="card-img-top"
            alt="..."
          />
          <div class="card-body">
            <h5 class="card-title">Card title</h5>

            <a href="https://youtu.be/-z0h3Qyg4e4" class="btn btn-primary"
              >Go somewhere</a
            >
          </div>
        </div>
      </div>
    </div>
    <footer class="footer text-center py-3">
      <p class="mb-0">Copyright - chandru</p>
    </footer>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
