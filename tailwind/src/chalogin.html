<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="./output.css" />
  </head>
  <body class="bg-gray-900 flex justify-center items-center min-h-screen">
    <div class="bg-gray-700 rounded-lg p-8 max-w-sm w-full shadow-2xl">
      <h2 class="text-center font-bold text-white text-3xl mb-6">Login</h2>
      <form>
        <div class="mb-4">
          <label class="block text-sm font-medium text-gray-300 mb-2" for="email">Email</label>
          <input class="bg-gray-600 text-white focus:outline-none focus:ring-2 focus:ring-blue-500 text-sm rounded-md px-3 py-2 w-full " type="email" name="email" placeholder="Email" id="" />
        </div>
        <div class="mb-6">
          <label class="block text-sm font-medium text-gray-300 mb-2" for="password">Password</label>
          <input class="bg-gray-600 text-white focus:outline-none focus:ring-2 focus:ring-blue-500 text-sm rounded-md px-3 py-2 w-full " type="password" name="password" placeholder="Password" id="" />
        </div>
        <button class="w-full bg-blue-600 text-white py-2 rounded-md hover:bg-blue-700 shadow-2xl" >Login</button>
      </form>
    </div>
  </body>
</html>
